<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatr — Website Kansen</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.HEATR_CONFIG = {
      SUPABASE_URL: 'https://zomdrygdcaenjnrrpcpw.supabase.co',
      SUPABASE_ANON_KEY: 'dev-mode',
      API_BASE: 'http://localhost:8001',
    };
  </script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-crumbs">
          <span>Heatr</span><span class="sep">·</span><span>Website Kansen</span>
        </div>
        <div class="topbar-spacer"></div>
      </header>

      <div class="content">
        <div class="page-head">
          <div>
            <div class="page-head-eyebrow">Website intelligence</div>
            <h1>Website Kansen</h1>
            <p class="page-head-sub">Leads met de grootste website-pijnpunten — eerste prioriteit voor outreach.</p>
          </div>
        </div>

        <div class="table-wrap">
          <div class="table-toolbar">
            <div class="table-filters">
              <button class="filter-chip active" data-filter="sector" data-value="">Alle sectoren</button>
              <button class="filter-chip" data-filter="sector" data-value="makelaars">Makelaars</button>
              <button class="filter-chip" data-filter="sector" data-value="alternatieve_geneeskunde">Alt. geneeskunde</button>
              <button class="filter-chip" data-filter="sector" data-value="cosmetische_behandelaars">Cosmetisch</button>
              <button class="filter-chip" data-filter="sector" data-value="bouwbedrijven">Bouw</button>
            </div>
            <div style="margin-left:auto; display:flex; gap: var(--space-3);">
              <select id="filter-priority" class="select" style="width: 160px;">
                <option value="">Alle prioriteiten</option>
                <option value="urgent">Urgent (&lt;30)</option>
                <option value="high">Hoog (30-44)</option>
                <option value="medium">Medium (45-69)</option>
              </select>
              <select id="sort-by" class="select" style="width: 200px;">
                <option value="opportunity">Grootste kans (lage score)</option>
                <option value="market">Onder marktgemiddelde</option>
                <option value="score">Hoogste lead score</option>
              </select>
            </div>
          </div>

          <div id="kansen-list" style="padding: var(--space-6); display:flex; flex-direction:column; gap: var(--space-5);">
            <div class="skeleton" style="height: 120px;"></div>
            <div class="skeleton" style="height: 120px;"></div>
            <div class="skeleton" style="height: 120px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script>
    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    let _allLeads = [];
    let _filters = { sector: '', priority: '', sort: 'opportunity' };

    function priorityFromScore(score) {
      if (score < 30) return { label: 'urgent', badge: 'badge-danger' };
      if (score < 45) return { label: 'hoog', badge: 'badge-warning' };
      if (score < 70) return { label: 'medium', badge: 'badge-info' };
      return { label: 'laag', badge: 'badge-success' };
    }

    function applyFilters() {
      let filtered = _allLeads.filter(l => {
        if (_filters.sector && l.sector !== _filters.sector) return false;
        const ws = l.website_score || 0;
        if (_filters.priority === 'urgent' && ws >= 30) return false;
        if (_filters.priority === 'high' && (ws < 30 || ws >= 45)) return false;
        if (_filters.priority === 'medium' && (ws < 45 || ws >= 70)) return false;
        return ws > 0;
      });

      filtered.sort((a, b) => {
        switch (_filters.sort) {
          case 'market': return (a.score_vs_market || 0) - (b.score_vs_market || 0);
          case 'score': return (b.score || 0) - (a.score || 0);
          default: return (a.website_score || 0) - (b.website_score || 0);
        }
      });

      render(filtered);
    }

    function render(leads) {
      const container = document.getElementById('kansen-list');
      if (!leads.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⊘</div>Geen kansen gevonden met deze filters</div>';
        return;
      }

      container.innerHTML = leads.map(l => {
        const ws = l.website_score || 0;
        const prio = priorityFromScore(ws);
        const vsMkt = l.score_vs_market;
        const opener = l.personalized_opener || '';

        return `
          <a href="/lead-detail.html?id=${l.id}" class="card" style="display:block; text-decoration:none; color:inherit; transition: var(--transition);" onmouseover="this.style.boxShadow='var(--shadow-sm)'; this.style.borderColor='var(--stone-200)'" onmouseout="this.style.boxShadow=''; this.style.borderColor='var(--stone-100)'">
            <div class="card-body">
              <div style="display: grid; grid-template-columns: 1fr auto auto; gap: var(--space-6); align-items: start;">
                <div>
                  <div class="row" style="gap: var(--space-4); margin-bottom: var(--space-3);">
                    <span class="h2">${escapeHtml(l.company_name)}</span>
                    <span class="sector-chip sector-${l.sector || ''}">${SECTOR_LABELS[l.sector] || l.sector || '—'}</span>
                    <span class="badge ${prio.badge}">${prio.label}</span>
                  </div>
                  <div class="body-sm muted">
                    <a href="https://${l.domain}" target="_blank" onclick="event.stopPropagation()">${escapeHtml(l.domain || '—')} ↗</a>
                    · ${escapeHtml(l.city || '')}
                    ${l.google_rating ? ` · ${l.google_rating}★ (${l.google_review_count || 0})` : ''}
                  </div>
                </div>
                <div style="text-align: center;">
                  <div class="eyebrow" style="margin-bottom: var(--space-2);">Website</div>
                  <div class="display-lg" style="font-variant-numeric: tabular-nums;">${ws}</div>
                  <div class="body-sm muted">/100</div>
                </div>
                <div style="text-align: center;">
                  <div class="eyebrow" style="margin-bottom: var(--space-2);">vs markt</div>
                  <div class="display-lg" style="font-variant-numeric: tabular-nums; color: ${vsMkt > 0 ? 'var(--success)' : (vsMkt < 0 ? 'var(--danger)' : 'var(--ink)')};">${vsMkt !== null && vsMkt !== undefined ? (vsMkt > 0 ? '+' : '') + vsMkt : '—'}</div>
                  <div class="body-sm muted">delta</div>
                </div>
              </div>
              ${opener ? `<div class="review-quote" style="margin-top: var(--space-5); border-left-color: var(--blush-400); background: var(--blush-50);">"${escapeHtml(opener)}"</div>` : ''}
            </div>
          </a>
        `;
      }).join('');
    }

    (async function init() {
      await requireAuth();
      renderSidebar('website-kansen');

      try {
        const res = await apiCall('/leads?limit=200');
        _allLeads = (res.leads || []).filter(l => l.website_score);
        applyFilters();

        document.getElementById('filter-priority').addEventListener('change', (e) => {
          _filters.priority = e.target.value; applyFilters();
        });
        document.getElementById('sort-by').addEventListener('change', (e) => {
          _filters.sort = e.target.value; applyFilters();
        });
        document.querySelectorAll('.filter-chip[data-filter="sector"]').forEach(chip => {
          chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip[data-filter="sector"]').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            _filters.sector = chip.dataset.value;
            applyFilters();
          });
        });
      } catch (e) {
        document.getElementById('kansen-list').innerHTML = `<div class="empty-state">Fout: ${escapeHtml(e.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
