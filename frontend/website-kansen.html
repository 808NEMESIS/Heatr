<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatr — Website Kansen</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.HEATR_CONFIG = {
      SUPABASE_URL: 'https://zomdrygdcaenjnrrpcpw.supabase.co',
      SUPABASE_ANON_KEY: 'dev-mode',
      API_BASE: 'http://localhost:8000',
    };
  </script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-wrapper">
      <main class="page-content">
        <header class="page-header">
          <div>
            <h1 class="page-title">Website Kansen</h1>
            <div class="page-subtitle">Leads met de grootste website-pijnpunten — eerste prioriteit voor outreach</div>
          </div>
        </header>

        <div class="filter-bar">
          <select id="filter-sector">
            <option value="">Alle sectoren</option>
            <option value="makelaars">Makelaars</option>
            <option value="alternatieve_geneeskunde">Alternatieve Geneeskunde</option>
            <option value="cosmetische_behandelaars">Cosmetische Behandelaars</option>
            <option value="bouwbedrijven">Bouwbedrijven</option>
          </select>
          <select id="filter-priority">
            <option value="">Alle prioriteiten</option>
            <option value="urgent">Urgent (score &lt;30)</option>
            <option value="high">Hoog (score 30-50)</option>
            <option value="medium">Medium (score 50-70)</option>
          </select>
          <select id="sort-by">
            <option value="opportunity">Grootste kans (lage website score)</option>
            <option value="market">Meest onder marktgemiddelde</option>
            <option value="score">Hoogste lead score</option>
          </select>
        </div>

        <div id="kansen-list">
          <div class="card" style="margin-bottom: 12px;"><div class="skeleton" style="height: 120px;"></div></div>
          <div class="card" style="margin-bottom: 12px;"><div class="skeleton" style="height: 120px;"></div></div>
          <div class="card"><div class="skeleton" style="height: 120px;"></div></div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script>
    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    let _allLeads = [];

    function priorityFromScore(score) {
      if (score < 30) return { label: 'urgent', color: 'red' };
      if (score < 50) return { label: 'hoog', color: 'orange' };
      if (score < 70) return { label: 'medium', color: 'yellow' };
      return { label: 'laag', color: 'green' };
    }

    function applyFilters() {
      const sector = document.getElementById('filter-sector').value;
      const priority = document.getElementById('filter-priority').value;
      const sortBy = document.getElementById('sort-by').value;

      let filtered = _allLeads.filter(l => {
        if (sector && l.sector !== sector) return false;
        const ws = l.website_score || 0;
        if (priority === 'urgent' && ws >= 30) return false;
        if (priority === 'high' && (ws < 30 || ws >= 50)) return false;
        if (priority === 'medium' && (ws < 50 || ws >= 70)) return false;
        return ws > 0;
      });

      filtered.sort((a, b) => {
        switch (sortBy) {
          case 'market': return (a.score_vs_market || 0) - (b.score_vs_market || 0);
          case 'score': return (b.score || 0) - (a.score || 0);
          default: return (a.website_score || 0) - (b.website_score || 0);
        }
      });

      render(filtered);
    }

    function render(leads) {
      if (!leads.length) {
        document.getElementById('kansen-list').innerHTML = '<div class="card empty-state"><div class="empty-state-icon">⊘</div>Geen kansen gevonden</div>';
        return;
      }

      document.getElementById('kansen-list').innerHTML = leads.map(l => {
        const ws = l.website_score || 0;
        const prio = priorityFromScore(ws);
        const vsMkt = l.score_vs_market;
        const opener = l.personalized_opener || '';

        return `
          <a href="/lead-detail.html?id=${l.id}" class="card" style="display:block; margin-bottom: 12px; text-decoration:none; color:inherit; transition: var(--transition);" onmouseover="this.style.boxShadow='var(--shadow)'; this.style.borderColor='var(--border-2)'" onmouseout="this.style.boxShadow=''; this.style.borderColor='var(--border)'">
            <div style="display: grid; grid-template-columns: 1fr auto auto; gap: 16px; align-items: start;">
              <div>
                <div style="display:flex; align-items:center; gap: 10px; margin-bottom: 4px;">
                  <span class="lead-row-company" style="font-size: 1.0625rem;">${escapeHtml(l.company_name)}</span>
                  <span class="sector-chip sector-${l.sector || ''}">${SECTOR_LABELS[l.sector] || l.sector || '—'}</span>
                  <span class="score-badge score-badge-${prio.color}">${prio.label}</span>
                </div>
                <div style="font-size: .8125rem; color: var(--text-muted);">
                  <a href="https://${l.domain}" target="_blank" style="color: var(--accent);" onclick="event.stopPropagation()">${escapeHtml(l.domain || '—')} ↗</a>
                  · ${escapeHtml(l.city || '')}
                  · ${l.google_rating ? `${l.google_rating}★` : ''}${l.google_review_count ? ` (${l.google_review_count})` : ''}
                </div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: .6875rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em;">Website</div>
                <div style="font-family: var(--font-display); font-size: 1.875rem; font-weight: 600; line-height: 1;">${ws}</div>
                <div style="font-size: .75rem; color: var(--text-muted);">/100</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: .6875rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em;">vs markt</div>
                <div style="font-family: var(--font-display); font-size: 1.875rem; font-weight: 600; line-height: 1; color: ${vsMkt > 0 ? 'var(--green)' : (vsMkt < 0 ? 'var(--red)' : 'var(--text)')};">${vsMkt !== null && vsMkt !== undefined ? (vsMkt > 0 ? '+' : '') + vsMkt : '—'}</div>
                <div style="font-size: .75rem; color: var(--text-muted);">delta</div>
              </div>
            </div>
            ${opener ? `
              <div style="margin-top: 14px; padding: 12px 14px; background: var(--surface-2); border-left: 3px solid var(--accent); border-radius: 0 var(--radius-input) var(--radius-input) 0; font-size: .875rem; color: var(--text-2); line-height: 1.55; font-style: italic;">
                "${escapeHtml(opener)}"
              </div>
            ` : ''}
          </a>
        `;
      }).join('');
    }

    (async function init() {
      await requireAuth();
      renderSidebar('website-kansen');

      try {
        const res = await apiCall('/leads?limit=200');
        _allLeads = (res.leads || []).filter(l => l.website_score);

        // Need to fetch website_intelligence for each lead to get score_vs_market
        // For now just render with what we have
        applyFilters();

        ['filter-sector', 'filter-priority', 'sort-by'].forEach(id => {
          document.getElementById(id).addEventListener('change', applyFilters);
        });
      } catch (e) {
        document.getElementById('kansen-list').innerHTML = `<div class="card empty-state">Fout: ${escapeHtml(e.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
