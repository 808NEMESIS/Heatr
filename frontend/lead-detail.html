<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatr — Lead detail</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.HEATR_CONFIG = {
      SUPABASE_URL: 'https://zomdrygdcaenjnrrpcpw.supabase.co',
      SUPABASE_ANON_KEY: 'dev-mode',
      API_BASE: 'http://localhost:8000',
    };
  </script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-wrapper">
      <main class="page-content">
        <a href="/leads.html" class="btn btn-ghost btn-sm" style="margin-bottom: 16px;">← Terug naar leads</a>

        <header class="page-header" id="lead-header">
          <div>
            <h1 class="page-title" id="lead-name">Laden…</h1>
            <div class="page-subtitle" id="lead-meta"></div>
          </div>
          <div class="page-actions" id="lead-actions"></div>
        </header>

        <!-- Top-level scores grid -->
        <section class="kpi-grid" id="lead-scores">
          <div class="kpi"><div class="kpi-accent"></div>
            <div class="kpi-label">Lead score</div>
            <div class="kpi-value" id="score-lead">—</div>
            <div class="kpi-delta flat" id="score-lead-detail"></div>
          </div>
          <div class="kpi"><div class="kpi-accent"></div>
            <div class="kpi-label">Website score</div>
            <div class="kpi-value" id="score-website">—</div>
            <div class="kpi-delta flat" id="score-website-detail"></div>
          </div>
          <div class="kpi"><div class="kpi-accent"></div>
            <div class="kpi-label">vs. markt</div>
            <div class="kpi-value" id="score-market">—</div>
            <div class="kpi-delta flat" id="score-market-detail"></div>
          </div>
          <div class="kpi"><div class="kpi-accent"></div>
            <div class="kpi-label">Reviews</div>
            <div class="kpi-value" id="score-reviews">—</div>
            <div class="kpi-delta flat" id="score-reviews-detail"></div>
          </div>
        </section>

        <!-- Outreach openers — the killer feature -->
        <section style="margin-bottom: 32px;">
          <div style="display:flex; align-items:flex-end; justify-content:space-between; margin-bottom: 14px;">
            <div>
              <h2 style="font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; letter-spacing: -.02em;">Outreach openers</h2>
              <div style="color: var(--text-muted); font-size: .875rem; margin-top: 2px;">AI-gegenereerd op basis van website, concurrenten en reviews</div>
            </div>
          </div>
          <div id="openers-list">
            <div class="skeleton" style="height: 90px; margin-bottom: 12px;"></div>
            <div class="skeleton" style="height: 90px;"></div>
          </div>
        </section>

        <!-- Two column: competitors + reviews -->
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
          <section class="competitor-card">
            <div class="card-header">
              <div>
                <div class="card-title">Concurrenten in dezelfde stad</div>
                <div class="card-subtitle" id="comp-subtitle">—</div>
              </div>
            </div>
            <div id="competitors-list">
              <div class="skeleton" style="height: 36px; margin-bottom: 8px;"></div>
              <div class="skeleton" style="height: 36px;"></div>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div>
                <div class="card-title">Klantreviews</div>
                <div class="card-subtitle" id="review-subtitle">—</div>
              </div>
            </div>
            <div id="reviews-block">
              <div class="skeleton" style="height: 60px;"></div>
            </div>
          </section>
        </div>

        <!-- Website intelligence breakdown -->
        <section class="card" style="margin-bottom: 24px;">
          <div class="card-header">
            <div class="card-title">Website intelligence — breakdown</div>
          </div>
          <div id="wi-breakdown" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
            <div class="skeleton" style="height: 80px;"></div>
            <div class="skeleton" style="height: 80px;"></div>
            <div class="skeleton" style="height: 80px;"></div>
          </div>
        </section>

        <!-- Bedrijfsinfo + contact -->
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <section class="card">
            <div class="card-header"><div class="card-title">Bedrijfsinfo</div></div>
            <dl id="company-info" style="display:grid; grid-template-columns: 1fr 2fr; gap: 8px 16px; font-size: .875rem;"></dl>
          </section>

          <section class="card">
            <div class="card-header"><div class="card-title">Contactpersoon</div></div>
            <div id="contact-info">
              <div style="color: var(--text-muted); padding: 12px 0;">Nog niet gevonden</div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script>
    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function copyOpener(idx) {
      const text = window._openers[idx].opener;
      navigator.clipboard.writeText(text).then(() => showToast('Opener gekopieerd', 'success'));
    }

    (async function init() {
      const params = new URLSearchParams(window.location.search);
      const leadId = params.get('id');
      await requireAuth();
      renderSidebar('leads');

      if (!leadId) {
        document.getElementById('lead-name').textContent = 'Geen lead geselecteerd';
        return;
      }

      try {
        const lead = await apiCall(`/leads/${leadId}`);

        document.getElementById('lead-name').textContent = lead.company_name;
        document.getElementById('lead-meta').innerHTML = `
          <span class="sector-chip sector-${lead.sector || ''}">${SECTOR_LABELS[lead.sector] || lead.sector || '—'}</span>
          <span style="margin-left: 10px;">${escapeHtml(lead.city || '')}</span>
          ${lead.domain ? ` · <a href="https://${lead.domain}" target="_blank" rel="noopener">${escapeHtml(lead.domain)} ↗</a>` : ''}
        `;
        document.getElementById('lead-actions').innerHTML = `
          ${lead.google_maps_url ? `<a href="${lead.google_maps_url}" target="_blank" class="btn btn-secondary btn-sm">Google Maps ↗</a>` : ''}
          <button class="btn btn-primary btn-sm" onclick="alert('Push naar Warmr — wacht op offer definitie')">Push naar Warmr</button>
        `;

        // Scores
        document.getElementById('score-lead').innerHTML = formatScore(lead.score || 0);
        document.getElementById('score-lead-detail').textContent = `fit ${lead.fit_score || 0} · reach ${lead.reachability_score || 0}`;
        document.getElementById('score-website').innerHTML = formatScore(lead.website_score || 0);
        document.getElementById('score-website-detail').textContent = '0–100';
        document.getElementById('score-reviews').textContent = lead.google_review_count || 0;
        document.getElementById('score-reviews-detail').textContent = `${lead.google_rating || '—'}★ rating`;

        // Outreach openers
        const hooks = lead.outreach_hooks || [];
        window._openers = hooks;

        if (hooks.length) {
          const sourcesLabel = (sources) => (sources || []).map(s => {
            const map = { website_analysis: 'website', competitor_benchmark: 'concurrent', google_reviews: 'review' };
            return `<span class="opener-source">${map[s] || s}</span>`;
          }).join('');

          document.getElementById('openers-list').innerHTML = hooks.map((h, idx) => `
            <div class="opener-card">
              <div class="opener-rank">#${h.rank || idx + 1}</div>
              <div class="opener-text">${escapeHtml(h.opener)}</div>
              <div class="opener-meta">
                ${sourcesLabel(h.data_sources)}
                <div class="opener-actions">
                  <button class="btn btn-ghost btn-sm" onclick="copyOpener(${idx})">Kopieer</button>
                </div>
              </div>
            </div>
          `).join('');
        } else if (lead.personalized_opener) {
          document.getElementById('openers-list').innerHTML = `
            <div class="opener-card">
              <div class="opener-rank">#1</div>
              <div class="opener-text">${escapeHtml(lead.personalized_opener)}</div>
              <div class="opener-meta">
                <span class="opener-source">website</span>
                <div class="opener-actions">
                  <button class="btn btn-ghost btn-sm" onclick="navigator.clipboard.writeText('${lead.personalized_opener.replace(/'/g, "\\'")}'); showToast('Gekopieerd', 'success')">Kopieer</button>
                </div>
              </div>
            </div>
          `;
        } else {
          document.getElementById('openers-list').innerHTML = '<div class="empty-state">Nog geen openers gegenereerd</div>';
        }

        // Website intelligence
        try {
          const wi = await apiCall(`/leads/${leadId}/website`);

          // vs markt
          const vsMkt = wi.score_vs_market;
          if (vsMkt !== null && vsMkt !== undefined) {
            const sign = vsMkt > 0 ? '+' : '';
            document.getElementById('score-market').textContent = `${sign}${vsMkt}`;
            document.getElementById('score-market').style.color = vsMkt > 0 ? 'var(--green)' : (vsMkt < 0 ? 'var(--red)' : 'var(--text)');
            document.getElementById('score-market-detail').textContent = `markt ⌀${wi.competitor_data?.market_avg_score || '?'}`;
          } else {
            document.getElementById('score-market').textContent = '—';
          }

          // Competitors
          const competitors = wi.competitor_data?.competitors || [];
          if (competitors.length) {
            document.getElementById('comp-subtitle').textContent = `Markt gemiddelde: ${wi.competitor_data?.market_avg_score || '?'}/100`;
            document.getElementById('competitors-list').innerHTML = competitors.map(c => `
              <div class="competitor-row">
                <div>
                  <div class="competitor-name">${escapeHtml(c.name || '?')}</div>
                  <div class="competitor-domain">${escapeHtml(c.domain || '')}</div>
                </div>
                <div class="competitor-score">${c.total_score || '?'}</div>
              </div>
            `).join('') + `
              <div class="market-position">
                <span style="font-size: .8125rem; font-weight: 600; color: var(--text-muted);">Jouw lead vs markt</span>
                <span class="market-delta ${vsMkt > 0 ? 'up' : 'down'}">${vsMkt > 0 ? '+' : ''}${vsMkt || 0}</span>
              </div>
            `;
          } else {
            document.getElementById('competitors-list').innerHTML = '<div class="empty-state" style="padding: 16px;">Geen concurrent-data</div>';
          }

          // WI breakdown
          document.getElementById('wi-breakdown').innerHTML = `
            <div>
              <div style="font-size: .75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px;">Technical</div>
              <div style="font-family: var(--font-display); font-size: 1.75rem; font-weight: 600;">${wi.technical_score || 0}<span style="font-size: 1rem; color: var(--text-muted);">/25</span></div>
              <div style="font-size: .8125rem; color: var(--text-muted); margin-top: 2px;">SSL, CMS, sitemap, schema</div>
            </div>
            <div>
              <div style="font-size: .75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px;">Conversion</div>
              <div style="font-family: var(--font-display); font-size: 1.75rem; font-weight: 600;">${wi.conversion_score || 0}<span style="font-size: 1rem; color: var(--text-muted);">/30</span></div>
              <div style="font-size: .8125rem; color: var(--text-muted); margin-top: 2px;">CTA, booking, WhatsApp, chat</div>
            </div>
            <div>
              <div style="font-size: .75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px;">Sector</div>
              <div style="font-family: var(--font-display); font-size: 1.75rem; font-weight: 600;">${wi.sector_score || 0}<span style="font-size: 1rem; color: var(--text-muted);">/15</span></div>
              <div style="font-size: .8125rem; color: var(--text-muted); margin-top: 2px;">Sector-specifieke checks</div>
            </div>
          `;
        } catch (e) {
          document.getElementById('wi-breakdown').innerHTML = '<div class="empty-state">Nog geen website analyse</div>';
        }

        // Reviews
        const review = lead.review_analysis || {};
        if (review.best_quote || (review.complaints && review.complaints.length)) {
          document.getElementById('review-subtitle').textContent = `${(review.complaints || []).length} klachten · ${(review.compliments || []).length} complimenten`;
          let reviewHtml = '';
          if (review.best_quote) reviewHtml += `<div class="review-quote">"${escapeHtml(review.best_quote)}"</div>`;
          if (lead.review_pain_points && lead.review_pain_points.length) {
            reviewHtml += '<div style="margin-top: 12px;"><div style="font-size: .75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px;">Pain points</div>';
            reviewHtml += lead.review_pain_points.map(p => `<span class="review-pain-tag">${escapeHtml(p.replace(/_/g, ' '))}</span>`).join('') + '</div>';
          }
          if (review.summary) reviewHtml += `<div style="margin-top: 12px; font-size: .875rem; color: var(--text-2);">${escapeHtml(review.summary)}</div>`;
          document.getElementById('reviews-block').innerHTML = reviewHtml;
        } else {
          document.getElementById('reviews-block').innerHTML = '<div class="empty-state" style="padding: 16px;">Geen review-analyse beschikbaar</div>';
          document.getElementById('review-subtitle').textContent = '—';
        }

        // Bedrijfsinfo
        const info = [
          ['Domein', lead.domain || '—'],
          ['Stad', lead.city || '—'],
          ['Telefoon', lead.phone || '—'],
          ['Categorie', lead.google_category || '—'],
          ['Rating', lead.google_rating ? `${lead.google_rating}★` : '—'],
          ['KvK', lead.kvk_number || '—'],
        ];
        document.getElementById('company-info').innerHTML = info.map(([k, v]) => `
          <dt style="color: var(--text-muted); font-weight: 500;">${k}</dt>
          <dd style="color: var(--text); font-weight: 500;">${escapeHtml(String(v))}</dd>
        `).join('');

        // Contact
        if (lead.contact_first_name || lead.email) {
          document.getElementById('contact-info').innerHTML = `
            <div style="font-weight: 600; font-size: 1rem; margin-bottom: 4px;">${escapeHtml(lead.contact_first_name || '')} ${escapeHtml(lead.contact_last_name || '')}</div>
            ${lead.contact_title ? `<div style="color: var(--text-muted); font-size: .875rem; margin-bottom: 12px;">${escapeHtml(lead.contact_title)}</div>` : ''}
            ${lead.email ? `<div style="font-size: .875rem; margin-bottom: 4px;"><a href="mailto:${lead.email}">${escapeHtml(lead.email)}</a></div>` : ''}
            ${lead.contact_linkedin_url ? `<div style="font-size: .875rem;"><a href="${lead.contact_linkedin_url}" target="_blank">LinkedIn ↗</a></div>` : ''}
            ${lead.contact_why_chosen ? `<div style="margin-top: 12px; padding: 10px 12px; background: var(--surface-2); border-radius: var(--radius-input); font-size: .8125rem; color: var(--text-2);"><strong style="color: var(--text);">Waarom deze persoon:</strong> ${escapeHtml(lead.contact_why_chosen)}</div>` : ''}
          `;
        }

      } catch (e) {
        document.getElementById('lead-name').textContent = 'Fout';
        document.getElementById('lead-meta').textContent = e.message;
      }
    })();
  </script>
</body>
</html>
