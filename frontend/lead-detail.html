<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatr — Lead detail</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.HEATR_CONFIG = {
      SUPABASE_URL: 'https://zomdrygdcaenjnrrpcpw.supabase.co',
      SUPABASE_ANON_KEY: 'dev-mode',
      API_BASE: 'http://localhost:8000',
    };
  </script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-crumbs">
          <a href="/leads.html" style="color: var(--ink-3);">Leads</a>
          <span class="sep">›</span>
          <span id="crumb-name">Laden…</span>
        </div>
        <div class="topbar-spacer"></div>
        <a href="/leads.html" class="btn btn-ghost btn-sm">← Terug</a>
      </header>

      <div class="content">
        <div class="page-head">
          <div>
            <div class="page-head-eyebrow" id="lead-sector-eyebrow">—</div>
            <h1 id="lead-name">Laden…</h1>
            <p class="page-head-sub" id="lead-meta"></p>
          </div>
          <div class="page-head-actions" id="lead-actions"></div>
        </div>

        <!-- Score row -->
        <div class="grid-4">
          <div class="kpi">
            <div class="kpi-label">Lead score</div>
            <div class="kpi-value" id="score-lead">—</div>
            <div class="kpi-meta" id="score-lead-detail"></div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Website score</div>
            <div class="kpi-value" id="score-website">—</div>
            <div class="kpi-meta" id="score-website-detail">0–100</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">vs. markt</div>
            <div class="kpi-value" id="score-market">—</div>
            <div class="kpi-meta" id="score-market-detail"></div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Reviews</div>
            <div class="kpi-value" id="score-reviews">—</div>
            <div class="kpi-meta" id="score-reviews-detail"></div>
          </div>
        </div>

        <!-- Outreach openers -->
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title">Outreach openers</div>
              <div class="card-sub">AI-gegenereerd op basis van website, concurrenten en reviews</div>
            </div>
          </div>
          <div class="card-body" id="openers-list">
            <div class="skeleton" style="height: 80px; margin-bottom: 12px;"></div>
            <div class="skeleton" style="height: 80px;"></div>
          </div>
        </div>

        <!-- Two column: competitors + reviews -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6);">
          <div class="card">
            <div class="card-head">
              <div>
                <div class="card-title">Concurrenten in dezelfde stad</div>
                <div class="card-sub" id="comp-subtitle">—</div>
              </div>
            </div>
            <div class="card-body" id="competitors-list">
              <div class="skeleton" style="height: 36px; margin-bottom: 8px;"></div>
              <div class="skeleton" style="height: 36px;"></div>
            </div>
          </div>

          <div class="card">
            <div class="card-head">
              <div>
                <div class="card-title">Klantreviews</div>
                <div class="card-sub" id="review-subtitle">—</div>
              </div>
            </div>
            <div class="card-body" id="reviews-block">
              <div class="skeleton" style="height: 60px;"></div>
            </div>
          </div>
        </div>

        <!-- Website intelligence breakdown -->
        <div class="card">
          <div class="card-head">
            <div class="card-title">Website intelligence — breakdown</div>
          </div>
          <div class="card-body">
            <div id="wi-breakdown" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-7);">
              <div class="skeleton" style="height: 60px;"></div>
              <div class="skeleton" style="height: 60px;"></div>
              <div class="skeleton" style="height: 60px;"></div>
            </div>
          </div>
        </div>

        <!-- Bedrijfsinfo + contact -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6);">
          <div class="card">
            <div class="card-head"><div class="card-title">Bedrijfsinfo</div></div>
            <div class="card-body">
              <dl id="company-info" style="display: grid; grid-template-columns: 1fr 2fr; gap: var(--space-4) var(--space-6); font-size: var(--fs-sm);"></dl>
            </div>
          </div>

          <div class="card">
            <div class="card-head"><div class="card-title">Contactpersoon</div></div>
            <div class="card-body" id="contact-info">
              <div class="empty-state" style="padding: var(--space-6);">Nog niet gevonden</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script>
    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => showToast('Gekopieerd', 'success'));
    }

    (async function init() {
      const params = new URLSearchParams(window.location.search);
      const leadId = params.get('id');
      await requireAuth();
      renderSidebar('leads');

      if (!leadId) {
        document.getElementById('lead-name').textContent = 'Geen lead geselecteerd';
        return;
      }

      try {
        const lead = await apiCall(`/leads/${leadId}`);

        document.getElementById('crumb-name').textContent = lead.company_name;
        document.getElementById('lead-name').textContent = lead.company_name;
        document.getElementById('lead-sector-eyebrow').textContent = (SECTOR_LABELS[lead.sector] || lead.sector || 'onbekend').toUpperCase();

        document.getElementById('lead-meta').innerHTML = `
          <span class="sector-chip sector-${lead.sector || ''}">${SECTOR_LABELS[lead.sector] || lead.sector || '—'}</span>
          <span style="margin-left: var(--space-5); color: var(--ink-2);">${escapeHtml(lead.city || '')}</span>
          ${lead.domain ? `<span style="margin: 0 var(--space-3); color: var(--ink-4);">·</span><a href="https://${lead.domain}" target="_blank" rel="noopener">${escapeHtml(lead.domain)} ↗</a>` : ''}
        `;
        document.getElementById('lead-actions').innerHTML = `
          ${lead.google_maps_url ? `<a href="${lead.google_maps_url}" target="_blank" class="btn btn-secondary btn-sm">Maps ↗</a>` : ''}
          <button class="btn btn-primary btn-sm" onclick="alert('Push naar Warmr — wacht op offer definitie')">Push naar Warmr</button>
        `;

        // Scores
        document.getElementById('score-lead').innerHTML = formatScore(lead.score || 0);
        document.getElementById('score-lead-detail').innerHTML = `<span>fit ${lead.fit_score || 0}</span><span>·</span><span>reach ${lead.reachability_score || 0}</span>`;
        document.getElementById('score-website').innerHTML = formatScore(lead.website_score || 0);
        document.getElementById('score-reviews').textContent = lead.google_review_count || 0;
        document.getElementById('score-reviews-detail').innerHTML = `<span>${lead.google_rating || '—'}★ rating</span>`;

        // Openers
        const hooks = lead.outreach_hooks || [];
        const sourceChip = (s) => {
          const map = { website_analysis: 'website', competitor_benchmark: 'concurrent', google_reviews: 'review' };
          return `<span class="opener-source">${map[s] || s}</span>`;
        };
        if (hooks.length) {
          document.getElementById('openers-list').innerHTML = hooks.map((h, idx) => `
            <div class="opener-card">
              <div class="opener-rank">#${h.rank || idx + 1}</div>
              <div class="opener-text">"${escapeHtml(h.opener)}"</div>
              <div class="opener-meta">
                ${(h.data_sources || []).map(sourceChip).join('')}
                <div class="opener-actions">
                  <button class="btn btn-ghost btn-sm" onclick='copyText(${JSON.stringify(h.opener)})'>Kopieer</button>
                </div>
              </div>
            </div>
          `).join('');
        } else if (lead.personalized_opener) {
          document.getElementById('openers-list').innerHTML = `
            <div class="opener-card">
              <div class="opener-rank">#1</div>
              <div class="opener-text">"${escapeHtml(lead.personalized_opener)}"</div>
              <div class="opener-meta">
                <span class="opener-source">website</span>
                <div class="opener-actions">
                  <button class="btn btn-ghost btn-sm" onclick='copyText(${JSON.stringify(lead.personalized_opener)})'>Kopieer</button>
                </div>
              </div>
            </div>
          `;
        } else {
          document.getElementById('openers-list').innerHTML = '<div class="empty-state">Nog geen openers gegenereerd</div>';
        }

        // Website intelligence
        try {
          const wi = await apiCall(`/leads/${leadId}/website`);

          const vsMkt = wi.score_vs_market;
          if (vsMkt !== null && vsMkt !== undefined) {
            const sign = vsMkt > 0 ? '+' : '';
            document.getElementById('score-market').innerHTML = `<span style="color:${vsMkt > 0 ? 'var(--success)' : (vsMkt < 0 ? 'var(--danger)' : 'var(--ink)')};">${sign}${vsMkt}</span>`;
            document.getElementById('score-market-detail').innerHTML = `<span>markt ⌀${wi.competitor_data?.market_avg_score || '?'}</span>`;
          } else {
            document.getElementById('score-market').textContent = '—';
          }

          const competitors = wi.competitor_data?.competitors || [];
          if (competitors.length) {
            document.getElementById('comp-subtitle').textContent = `Markt gemiddelde: ${wi.competitor_data?.market_avg_score || '?'}/100`;
            document.getElementById('competitors-list').innerHTML = competitors.map(c => `
              <div class="competitor-row">
                <div>
                  <div class="competitor-name">${escapeHtml(c.name || '?')}</div>
                  <div class="competitor-domain">${escapeHtml(c.domain || '')}</div>
                </div>
                <div class="competitor-score">${c.total_score || '?'}</div>
              </div>
            `).join('') + `
              <div class="market-position">
                <span class="eyebrow">Jouw lead vs markt</span>
                <span class="market-delta ${vsMkt > 0 ? 'up' : 'down'}">${vsMkt > 0 ? '+' : ''}${vsMkt || 0}</span>
              </div>
            `;
          } else {
            document.getElementById('competitors-list').innerHTML = '<div class="empty-state">Geen concurrent-data</div>';
          }

          document.getElementById('wi-breakdown').innerHTML = `
            <div>
              <div class="eyebrow" style="margin-bottom: var(--space-3);">Technical</div>
              <div class="display-md" style="font-variant-numeric: tabular-nums;">${wi.technical_score || 0}<span style="font-size: var(--fs-md); color: var(--ink-3); font-family: var(--font-ui); font-weight: 400;">/25</span></div>
              <div class="body-sm muted" style="margin-top: var(--space-2);">SSL, CMS, sitemap, schema</div>
            </div>
            <div>
              <div class="eyebrow" style="margin-bottom: var(--space-3);">Conversion</div>
              <div class="display-md" style="font-variant-numeric: tabular-nums;">${wi.conversion_score || 0}<span style="font-size: var(--fs-md); color: var(--ink-3); font-family: var(--font-ui); font-weight: 400;">/30</span></div>
              <div class="body-sm muted" style="margin-top: var(--space-2);">CTA, booking, WhatsApp, chat</div>
            </div>
            <div>
              <div class="eyebrow" style="margin-bottom: var(--space-3);">Sector</div>
              <div class="display-md" style="font-variant-numeric: tabular-nums;">${wi.sector_score || 0}<span style="font-size: var(--fs-md); color: var(--ink-3); font-family: var(--font-ui); font-weight: 400;">/15</span></div>
              <div class="body-sm muted" style="margin-top: var(--space-2);">Sector-specifieke checks</div>
            </div>
          `;
        } catch (e) {
          document.getElementById('wi-breakdown').innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;">Nog geen website analyse</div>';
        }

        // Reviews
        const review = lead.review_analysis || {};
        if (review.best_quote || (review.complaints && review.complaints.length)) {
          document.getElementById('review-subtitle').textContent =
            `${(review.complaints || []).length} klachten · ${(review.compliments || []).length} complimenten`;
          let reviewHtml = '';
          if (review.best_quote) reviewHtml += `<div class="review-quote">"${escapeHtml(review.best_quote)}"</div>`;
          if (lead.review_pain_points && lead.review_pain_points.length) {
            reviewHtml += `<div style="margin-top: var(--space-5);"><div class="eyebrow" style="margin-bottom: var(--space-3);">Pain points</div>`;
            reviewHtml += lead.review_pain_points.map(p => `<span class="review-pain-tag">${escapeHtml(p.replace(/_/g, ' '))}</span>`).join('') + `</div>`;
          }
          if (review.summary) reviewHtml += `<div class="body-sm" style="margin-top: var(--space-5);">${escapeHtml(review.summary)}</div>`;
          document.getElementById('reviews-block').innerHTML = reviewHtml;
        } else {
          document.getElementById('reviews-block').innerHTML = '<div class="empty-state">Geen review-analyse beschikbaar</div>';
          document.getElementById('review-subtitle').textContent = '—';
        }

        // Bedrijfsinfo
        const info = [
          ['Domein', lead.domain || '—'],
          ['Stad', lead.city || '—'],
          ['Telefoon', lead.phone || '—'],
          ['Categorie', lead.google_category || '—'],
          ['Rating', lead.google_rating ? `${lead.google_rating}★ (${lead.google_review_count || 0})` : '—'],
          ['KvK', lead.kvk_number || '—'],
        ];
        document.getElementById('company-info').innerHTML = info.map(([k, v]) => `
          <dt class="label muted">${k}</dt>
          <dd style="color: var(--ink); font-weight: var(--fw-medium);">${escapeHtml(String(v))}</dd>
        `).join('');

        // Contact
        if (lead.contact_first_name || lead.email) {
          document.getElementById('contact-info').innerHTML = `
            <div class="h2" style="margin-bottom: var(--space-3);">${escapeHtml(lead.contact_first_name || '')} ${escapeHtml(lead.contact_last_name || '')}</div>
            ${lead.contact_title ? `<div class="muted body-sm" style="margin-bottom: var(--space-5);">${escapeHtml(lead.contact_title)}</div>` : ''}
            ${lead.email ? `<div style="margin-bottom: var(--space-3);"><a href="mailto:${lead.email}">${escapeHtml(lead.email)}</a></div>` : ''}
            ${lead.contact_linkedin_url ? `<div><a href="${lead.contact_linkedin_url}" target="_blank">LinkedIn ↗</a></div>` : ''}
            ${lead.contact_why_chosen ? `<div style="margin-top: var(--space-6); padding: var(--space-5) var(--space-6); background: var(--ivory); border-radius: var(--radius-md); font-size: var(--fs-sm); color: var(--ink-2);"><strong style="color: var(--ink); display:block; margin-bottom: var(--space-2);">Waarom deze persoon</strong>${escapeHtml(lead.contact_why_chosen)}</div>` : ''}
          `;
        }

      } catch (e) {
        document.getElementById('lead-name').textContent = 'Fout bij laden';
        document.getElementById('lead-meta').textContent = e.message;
      }
    })();
  </script>
</body>
</html>
