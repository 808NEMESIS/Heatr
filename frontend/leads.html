<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatr — Leads</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.HEATR_CONFIG = {
      SUPABASE_URL: 'https://zomdrygdcaenjnrrpcpw.supabase.co',
      SUPABASE_ANON_KEY: 'dev-mode',
      API_BASE: 'http://localhost:8000',
    };
  </script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-wrapper">
      <main class="page-content">
        <header class="page-header">
          <div>
            <h1 class="page-title">Leads</h1>
            <div class="page-subtitle" id="lead-count">Bezig met laden…</div>
          </div>
          <div class="page-actions">
            <a href="/search.html" class="btn btn-primary">+ Nieuwe zoekopdracht</a>
          </div>
        </header>

        <div class="filter-bar">
          <input type="text" id="search-input" placeholder="Zoek op bedrijf, domein, stad…" />
          <select id="filter-sector">
            <option value="">Alle sectoren</option>
            <option value="makelaars">Makelaars</option>
            <option value="alternatieve_geneeskunde">Alternatieve Geneeskunde</option>
            <option value="cosmetische_behandelaars">Cosmetische Behandelaars</option>
            <option value="bouwbedrijven">Bouwbedrijven</option>
          </select>
          <select id="filter-score">
            <option value="">Alle scores</option>
            <option value="80">80+ (push-klaar)</option>
            <option value="60">60+ (sterk)</option>
            <option value="40">40+ (medium)</option>
            <option value="0">Onder 40</option>
          </select>
          <select id="sort-by">
            <option value="score">Score (hoog → laag)</option>
            <option value="name">Naam (A → Z)</option>
            <option value="reviews">Meeste reviews</option>
            <option value="rating">Hoogste rating</option>
          </select>
        </div>

        <div id="leads-list">
          <div class="card" style="padding: 0;">
            <div class="lead-row" style="border-bottom: 1px solid var(--border);"><div class="skeleton" style="height: 60px;"></div></div>
            <div class="lead-row" style="border-bottom: 1px solid var(--border);"><div class="skeleton" style="height: 60px;"></div></div>
            <div class="lead-row"><div class="skeleton" style="height: 60px;"></div></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script>
    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    let _allLeads = [];

    function applyFilters() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const sector = document.getElementById('filter-sector').value;
      const minScore = parseInt(document.getElementById('filter-score').value, 10);
      const sortBy = document.getElementById('sort-by').value;

      let filtered = _allLeads.filter(l => {
        if (search && !(l.company_name || '').toLowerCase().includes(search) &&
            !(l.domain || '').toLowerCase().includes(search) &&
            !(l.city || '').toLowerCase().includes(search)) return false;
        if (sector && l.sector !== sector) return false;
        if (!isNaN(minScore)) {
          const s = l.score || 0;
          if (minScore === 0) { if (s >= 40) return false; }
          else if (s < minScore) return false;
        }
        return true;
      });

      filtered.sort((a, b) => {
        switch (sortBy) {
          case 'name': return (a.company_name || '').localeCompare(b.company_name || '');
          case 'reviews': return (b.google_review_count || 0) - (a.google_review_count || 0);
          case 'rating': return (b.google_rating || 0) - (a.google_rating || 0);
          default: return (b.score || 0) - (a.score || 0);
        }
      });

      renderLeads(filtered);
      document.getElementById('lead-count').textContent = `${filtered.length} van ${_allLeads.length} leads`;
    }

    function renderLeads(leads) {
      if (!leads.length) {
        document.getElementById('leads-list').innerHTML = '<div class="card empty-state"><div class="empty-state-icon">⊘</div>Geen leads gevonden</div>';
        return;
      }

      const html = '<div class="card" style="padding: 0;">' + leads.map(l => `
        <a href="/lead-detail.html?id=${l.id}" class="lead-row" style="display:block; border-bottom: 1px solid var(--border); text-decoration:none; color:inherit; transition: background var(--transition);" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='transparent'">
          <div class="lead-row-main">
            <div class="lead-row-name">
              <div style="display:flex; align-items:center; gap:10px;">
                <span class="lead-row-company">${escapeHtml(l.company_name)}</span>
                <span class="sector-chip sector-${l.sector || ''}">${SECTOR_LABELS[l.sector] || l.sector || '—'}</span>
              </div>
              <div class="lead-row-meta">
                <span class="lead-row-domain">${escapeHtml(l.domain || 'geen domein')}</span>
                <span style="color: var(--text-muted);">·</span>
                <span style="color: var(--text-muted); font-size: .8125rem;">${escapeHtml(l.city || '—')}</span>
                ${l.email ? `<span style="color: var(--text-muted);">·</span><span style="color: var(--green); font-size: .8125rem;">✓ email</span>` : ''}
              </div>
            </div>

            <div class="lead-row-stats">
              <div style="text-align: right;">
                <div style="font-weight: 600; color: var(--text);">${(l.google_rating || '—')}${l.google_rating ? '★' : ''}</div>
                <div style="font-size: .75rem;">${l.google_review_count || 0} reviews</div>
              </div>
            </div>

            <div style="text-align: right;">
              <div style="font-size: .6875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; margin-bottom: 2px;">Website</div>
              ${formatScore(l.website_score || 0)}
            </div>

            <div style="text-align: right;">
              <div style="font-size: .6875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; margin-bottom: 2px;">Lead</div>
              ${formatScore(l.score || 0)}
            </div>
          </div>
          ${l.personalized_opener ? `
            <div style="margin-top: 12px; padding: 10px 12px; background: var(--surface-2); border-left: 3px solid var(--accent); border-radius: 0 var(--radius-input) var(--radius-input) 0; font-size: .8125rem; color: var(--text-2); line-height: 1.5; font-style: italic;">
              "${escapeHtml(l.personalized_opener.slice(0, 220))}${l.personalized_opener.length > 220 ? '…' : ''}"
            </div>
          ` : ''}
        </a>
      `).join('') + '</div>';

      document.getElementById('leads-list').innerHTML = html;
    }

    (async function init() {
      await requireAuth();
      renderSidebar('leads');

      try {
        const res = await apiCall('/leads?limit=200');
        _allLeads = res.leads || [];
        applyFilters();

        ['search-input', 'filter-sector', 'filter-score', 'sort-by'].forEach(id => {
          document.getElementById(id).addEventListener('input', debounce(applyFilters, 200));
          document.getElementById(id).addEventListener('change', applyFilters);
        });
      } catch (e) {
        document.getElementById('leads-list').innerHTML = `<div class="card empty-state">Fout bij laden: ${escapeHtml(e.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
