<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatr — Leads</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.HEATR_CONFIG = {
      SUPABASE_URL: 'https://zomdrygdcaenjnrrpcpw.supabase.co',
      SUPABASE_ANON_KEY: 'dev-mode',
      API_BASE: 'http://localhost:8001',
    };
  </script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-crumbs">
          <span>Heatr</span><span class="sep">·</span><span>Leads</span>
        </div>
        <div class="topbar-spacer"></div>
        <div class="topbar-search">
          <span class="icon">🔍</span>
          <input type="text" id="search-input" placeholder="Zoek bedrijf, domein, stad…" />
          <span class="topbar-kbd">⌘K</span>
        </div>
      </header>

      <div class="content">
        <div class="page-head">
          <div>
            <div class="page-head-eyebrow">Lead database</div>
            <h1>Leads</h1>
            <p class="page-head-sub" id="lead-count">Bezig met laden…</p>
          </div>
          <div class="page-head-actions">
            <a href="/search.html" class="btn btn-primary"><span>+</span> Nieuwe zoekopdracht</a>
          </div>
        </div>

        <div class="table-wrap">
          <div class="table-toolbar">
            <div class="table-filters">
              <button class="filter-chip active" data-filter="sector" data-value="">Alle sectoren</button>
              <button class="filter-chip" data-filter="sector" data-value="makelaars">Makelaars</button>
              <button class="filter-chip" data-filter="sector" data-value="alternatieve_geneeskunde">Alt. geneeskunde</button>
              <button class="filter-chip" data-filter="sector" data-value="cosmetische_behandelaars">Cosmetisch</button>
              <button class="filter-chip" data-filter="sector" data-value="bouwbedrijven">Bouw</button>
            </div>
            <div style="margin-left:auto; display:flex; gap: var(--space-3);">
              <select id="filter-score" class="select" style="width: 150px;">
                <option value="">Alle scores</option>
                <option value="70">Hot (70+)</option>
                <option value="45">Warm (45+)</option>
                <option value="30">Koud (30-44)</option>
                <option value="0">Onder 30</option>
              </select>
              <select id="sort-by" class="select" style="width: 170px;">
                <option value="score">Score (hoog → laag)</option>
                <option value="name">Naam (A → Z)</option>
                <option value="reviews">Meeste reviews</option>
                <option value="rating">Hoogste rating</option>
              </select>
            </div>
          </div>

          <table class="data">
            <thead>
              <tr>
                <th>Bedrijf</th>
                <th>Sector</th>
                <th>Rating</th>
                <th>Website</th>
                <th>Score</th>
                <th>Email</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="leads-body">
              <tr><td colspan="7"><div class="skeleton" style="height: 40px;"></div></td></tr>
              <tr><td colspan="7"><div class="skeleton" style="height: 40px;"></div></td></tr>
              <tr><td colspan="7"><div class="skeleton" style="height: 40px;"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script>
    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function initials(name) {
      return (name || '?').split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
    }
    function scoreBar(value) {
      const v = Math.max(0, Math.min(100, value || 0));
      let color = 'var(--score-poor)';
      if (v >= 70) color = 'var(--score-good)';
      else if (v >= 45) color = 'var(--score-mid)';
      else if (v >= 30) color = 'var(--score-weak)';
      return `<div class="score-bar"><div class="score-bar-value">${v}</div><div class="score-bar-track"><div class="score-bar-fill" style="width:${v}%; background:${color};"></div></div></div>`;
    }

    let _allLeads = [];
    let _filters = { search: '', sector: '', minScore: NaN, sort: 'score' };

    function applyFilters() {
      let filtered = _allLeads.filter(l => {
        if (_filters.search) {
          const s = _filters.search.toLowerCase();
          if (!(l.company_name || '').toLowerCase().includes(s) &&
              !(l.domain || '').toLowerCase().includes(s) &&
              !(l.city || '').toLowerCase().includes(s)) return false;
        }
        if (_filters.sector && l.sector !== _filters.sector) return false;
        if (!isNaN(_filters.minScore)) {
          const sc = l.score || 0;
          if (_filters.minScore === 0) { if (sc >= 30) return false; }
          else if (sc < _filters.minScore) return false;
        }
        return true;
      });

      filtered.sort((a, b) => {
        switch (_filters.sort) {
          case 'name': return (a.company_name || '').localeCompare(b.company_name || '');
          case 'reviews': return (b.google_review_count || 0) - (a.google_review_count || 0);
          case 'rating': return (b.google_rating || 0) - (a.google_rating || 0);
          default: return (b.score || 0) - (a.score || 0);
        }
      });

      render(filtered);
      document.getElementById('lead-count').textContent =
        `${filtered.length} van ${_allLeads.length} leads tonen`;
    }

    function render(leads) {
      const body = document.getElementById('leads-body');
      if (!leads.length) {
        body.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">⊘</div>Geen leads gevonden met deze filters</div></td></tr>';
        return;
      }
      body.innerHTML = leads.map(l => `
        <tr onclick="window.location.href='/lead-detail.html?id=${l.id}'">
          <td class="strong">
            <div class="cell-lead">
              <div class="cell-lead-avatar">${initials(l.company_name)}</div>
              <div>
                <div class="cell-lead-name">${escapeHtml(l.company_name || '—').slice(0, 50)}</div>
                <div class="cell-lead-sub">${escapeHtml(l.domain || '')}${l.city ? ' · ' + escapeHtml(l.city) : ''}</div>
              </div>
            </div>
          </td>
          <td><span class="sector-chip sector-${l.sector || ''}">${SECTOR_LABELS[l.sector] || l.sector || '—'}</span></td>
          <td class="tabular">${l.google_rating ? l.google_rating + '★' : '—'} <span class="muted" style="font-size: var(--fs-xs);">${l.google_review_count ? '(' + l.google_review_count + ')' : ''}</span></td>
          <td style="min-width: 100px;">${scoreBar(l.website_score || 0)}</td>
          <td>${formatScore(l.score || 0)}</td>
          <td>${l.email ? `<span class="badge badge-success"><span class="badge-dot"></span>Verified</span>` : `<span class="badge badge-neutral"><span class="badge-dot"></span>Niet gevonden</span>`}</td>
          <td style="text-align:right;"><button class="btn btn-ghost btn-sm btn-icon" onclick="event.stopPropagation();window.location.href='/lead-detail.html?id=${l.id}'">→</button></td>
        </tr>
      `).join('');
    }

    (async function init() {
      await requireAuth();
      renderSidebar('leads');

      try {
        const res = await apiCall('/leads?limit=200');
        _allLeads = res.leads || [];
        applyFilters();

        document.getElementById('search-input').addEventListener('input', debounce((e) => {
          _filters.search = e.target.value; applyFilters();
        }, 200));
        document.getElementById('filter-score').addEventListener('change', (e) => {
          _filters.minScore = parseInt(e.target.value, 10); applyFilters();
        });
        document.getElementById('sort-by').addEventListener('change', (e) => {
          _filters.sort = e.target.value; applyFilters();
        });
        document.querySelectorAll('.filter-chip[data-filter="sector"]').forEach(chip => {
          chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip[data-filter="sector"]').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            _filters.sector = chip.dataset.value;
            applyFilters();
          });
        });
      } catch (e) {
        document.getElementById('leads-body').innerHTML =
          `<tr><td colspan="7"><div class="empty-state">Fout: ${escapeHtml(e.message)}</div></td></tr>`;
      }
    })();
  </script>
</body>
</html>
