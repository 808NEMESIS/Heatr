<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatr — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.HEATR_CONFIG = {
      SUPABASE_URL: 'https://zomdrygdcaenjnrrpcpw.supabase.co',
      SUPABASE_ANON_KEY: 'dev-mode',
      API_BASE: 'http://localhost:8000',
    };
  </script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-wrapper">
      <main class="page-content">
        <header class="page-header">
          <div>
            <h1 class="page-title">Dashboard</h1>
            <div class="page-subtitle">Realtime overzicht van je outbound pipeline</div>
          </div>
          <div class="page-actions">
            <a href="/search.html" class="btn btn-primary">+ Nieuwe zoekopdracht</a>
          </div>
        </header>

        <section class="kpi-grid">
          <div class="kpi"><div class="kpi-accent"></div>
            <div class="kpi-label">Totale leads</div>
            <div class="kpi-value" id="kpi-total">—</div>
            <div class="kpi-delta flat" id="kpi-total-detail"></div>
          </div>
          <div class="kpi"><div class="kpi-accent"></div>
            <div class="kpi-label">Gem. score</div>
            <div class="kpi-value" id="kpi-avg-score">—</div>
            <div class="kpi-delta flat" id="kpi-avg-detail"></div>
          </div>
          <div class="kpi"><div class="kpi-accent"></div>
            <div class="kpi-label">Push-klaar</div>
            <div class="kpi-value" id="kpi-pushable">—</div>
            <div class="kpi-delta flat">score ≥ 65 + email</div>
          </div>
          <div class="kpi"><div class="kpi-accent"></div>
            <div class="kpi-label">Met openers</div>
            <div class="kpi-value" id="kpi-openers">—</div>
            <div class="kpi-delta flat" id="kpi-openers-detail"></div>
          </div>
        </section>

        <div style="display:grid; grid-template-columns: 2fr 1fr; gap: 20px;">
          <section class="card card-elevated">
            <div class="card-header">
              <div>
                <div class="card-title">Top opportunities — beste openers</div>
                <div class="card-subtitle">Leads met sterkste pijnpunten en concurrent-data</div>
              </div>
              <a href="/website-kansen.html" class="btn btn-ghost btn-sm">Alle kansen →</a>
            </div>
            <div id="top-opportunities">
              <div class="skeleton" style="height: 80px; margin-bottom: 12px;"></div>
              <div class="skeleton" style="height: 80px; margin-bottom: 12px;"></div>
              <div class="skeleton" style="height: 80px;"></div>
            </div>
          </section>

          <section class="card card-elevated">
            <div class="card-header">
              <div class="card-title">Per sector</div>
            </div>
            <div id="sector-breakdown">
              <div class="skeleton" style="height: 48px; margin-bottom: 12px;"></div>
              <div class="skeleton" style="height: 48px; margin-bottom: 12px;"></div>
              <div class="skeleton" style="height: 48px;"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script>
    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    (async function init() {
      await requireAuth();
      renderSidebar('dashboard');

      try {
        const leadsRes = await apiCall('/leads?limit=100');
        const leads = leadsRes.leads || [];

        document.getElementById('kpi-total').textContent = leads.length;
        document.getElementById('kpi-total-detail').textContent = `${leads.filter(l => l.gdpr_safe).length} GDPR-safe`;

        const scores = leads.map(l => l.score || 0).filter(s => s > 0);
        const avgScore = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0) / scores.length) : 0;
        document.getElementById('kpi-avg-score').textContent = avgScore;
        if (scores.length) {
          document.getElementById('kpi-avg-detail').textContent = `range ${Math.min(...scores)}–${Math.max(...scores)}`;
        }

        const pushable = leads.filter(l => (l.score||0) >= 65 && l.email).length;
        document.getElementById('kpi-pushable').textContent = pushable;

        const withOpeners = leads.filter(l => l.personalized_opener).length;
        document.getElementById('kpi-openers').textContent = withOpeners;
        if (leads.length) {
          document.getElementById('kpi-openers-detail').textContent = `${Math.round(withOpeners/leads.length*100)}% verrijkt`;
        }

        const opps = leads
          .filter(l => l.personalized_opener)
          .sort((a, b) => (b.score || 0) - (a.score || 0))
          .slice(0, 5);

        const oppsHtml = opps.map(l => `
          <a href="/lead-detail.html?id=${l.id}" style="display:block; padding: 14px 0; border-bottom: 1px solid var(--border); text-decoration:none; color: inherit;">
            <div style="display:flex; align-items:center; justify-content: space-between; margin-bottom: 6px; gap: 12px;">
              <div style="display:flex; align-items:center; gap: 10px; min-width: 0; flex: 1;">
                <span class="lead-row-company" style="font-size: .9375rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(l.company_name)}</span>
                <span class="sector-chip sector-${l.sector || ''}">${SECTOR_LABELS[l.sector] || l.sector || '—'}</span>
              </div>
              ${formatScore(l.score || 0)}
            </div>
            <div style="font-size: .875rem; color: var(--text-2); line-height: 1.5; font-style: italic;">
              "${escapeHtml((l.personalized_opener || '').slice(0, 200))}${(l.personalized_opener || '').length > 200 ? '…' : ''}"
            </div>
          </a>
        `).join('');

        document.getElementById('top-opportunities').innerHTML = oppsHtml || '<div class="empty-state">Nog geen leads met openers — draai de enrichment pipeline</div>';

        const bySector = {};
        leads.forEach(l => {
          const s = l.sector || 'onbekend';
          if (!bySector[s]) bySector[s] = { count: 0, totalScore: 0 };
          bySector[s].count++;
          bySector[s].totalScore += (l.score || 0);
        });

        const sectorHtml = Object.entries(bySector)
          .sort((a, b) => b[1].count - a[1].count)
          .map(([sector, data]) => {
            const avg = data.count ? Math.round(data.totalScore / data.count) : 0;
            const pct = leads.length ? Math.round(data.count / leads.length * 100) : 0;
            return `
              <div style="margin-bottom: 14px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 6px;">
                  <span class="sector-chip sector-${sector}">${SECTOR_LABELS[sector] || sector}</span>
                  <span style="font-size: .8125rem; color: var(--text-muted); font-weight: 500;">${data.count} · ⌀${avg}</span>
                </div>
                <div style="height: 6px; background: var(--surface-3); border-radius: 3px; overflow: hidden;">
                  <div style="height: 100%; width: ${pct}%; background: var(--accent-gradient); border-radius: 3px;"></div>
                </div>
              </div>
            `;
          }).join('');

        document.getElementById('sector-breakdown').innerHTML = sectorHtml || '<div class="empty-state">Geen data</div>';

      } catch (e) {
        console.error(e);
        document.getElementById('top-opportunities').innerHTML = `<div class="empty-state">Fout bij laden: ${escapeHtml(e.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
