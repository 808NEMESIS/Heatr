version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PLAYWRIGHT_HEADLESS: "true"
    volumes:
      - ./:/app          # live-reload in dev; remove in production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Optional: run n8n locally alongside the API
  # n8n:
  #   image: n8nio/n8n:latest
  #   ports:
  #     - "5678:5678"
  #   environment:
  #     N8N_BASIC_AUTH_ACTIVE: "true"
  #     N8N_BASIC_AUTH_USER: admin
  #     N8N_BASIC_AUTH_PASSWORD: changeme
  #     WEBHOOK_URL: http://api:8000
  #   volumes:
  #     - n8n_data:/home/node/.n8n
  #   depends_on:
  #     - api

volumes:
  n8n_data:
